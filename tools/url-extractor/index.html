<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Extractor - My Tools Hub</title>
    <link rel="icon" type="image/x-icon" href="../../assets/img/favicon.png" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Shared Neumorphism DNA -->
    <link rel="stylesheet" href="../../assets/css/neumorphism.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-3 sm:p-6 font-sans antialiased bg-zinc-900"
  >
    <div
      class="neu-flat w-full max-w-3xl p-4 sm:p-8 flex flex-col gap-4 sm:gap-6"
    >
      <!-- Header & Navigation -->
      <div class="flex items-center gap-4 pb-2">
        <a
          href="../../index.html"
          class="neu-btn w-10 h-10 flex items-center justify-center text-gray-500 hover:text-red-500 transition"
          title="Back to Hub"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1
          class="text-xl sm:text-2xl font-extrabold tracking-widest text-red-500 uppercase flex items-center gap-2"
        >
          <i class="fa-solid fa-link"></i> URL Extractor
        </h1>
      </div>

      <!-- Input Area -->
      <div class="flex flex-col gap-2">
        <label
          for="input-text"
          class="text-xs font-bold text-gray-500 uppercase tracking-wider"
        >
          Input Text
        </label>
        <textarea
          id="input-text"
          class="neu-pressed w-full min-h-[140px] p-4 text-white bg-transparent outline-none resize-y placeholder-gray-600"
          placeholder="Paste text containing URLs here..."
        ></textarea>
      </div>

      <!-- Toolbar -->
      <div class="flex flex-wrap gap-2" id="toolbar">
        <button
          id="extract-btn"
          class="neu-btn px-4 py-2 text-sm text-gray-300 font-medium flex items-center gap-2"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
          Extract URLs
        </button>
        <button
          id="dedupe-btn"
          data-active="true"
          class="neu-btn neu-active px-4 py-2 text-sm text-gray-300 font-medium flex items-center gap-2"
        >
          <i class="fa-solid fa-filter"></i>
          Deduplicate
        </button>
        <button
          id="clear-btn"
          class="neu-btn px-4 py-2 text-sm text-gray-300 font-medium flex items-center gap-2"
        >
          <i class="fa-solid fa-eraser"></i>
          Clear
        </button>
      </div>

      <!-- Output Area -->
      <div class="flex flex-col gap-2">
        <div class="flex items-center justify-between">
          <label
            for="output-text"
            class="text-xs font-bold text-gray-500 uppercase tracking-wider"
          >
            Extracted URLs
          </label>
          <button
            id="copy-btn"
            class="neu-btn px-4 py-1.5 text-xs text-gray-300 font-semibold flex items-center gap-2"
          >
            <i class="fa-regular fa-copy"></i>
            <span id="copy-btn-label">Copy All</span>
          </button>
        </div>
        <textarea
          id="output-text"
          class="neu-pressed w-full min-h-[140px] p-4 text-red-500 bg-transparent outline-none resize-y"
          placeholder="Extracted URLs will appear here, one per line..."
          readonly
        ></textarea>
      </div>

      <!-- Stats -->
      <div class="flex justify-end gap-4 text-xs text-gray-500">
        <span id="url-count">0 URLs found</span>
        <span id="char-count">0 characters</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
