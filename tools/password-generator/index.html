<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator - My Tools Hub</title>
    <link rel="icon" type="image/x-icon" href="../../assets/img/favicon.png" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Shared Neumorphism DNA -->
    <link rel="stylesheet" href="../../assets/css/neumorphism.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-3 sm:p-6 font-sans antialiased bg-zinc-900"
  >
    <div
      class="neu-flat w-full max-w-3xl p-4 sm:p-8 flex flex-col gap-4 sm:gap-6"
    >
      <!-- Header & Navigation -->
      <div class="flex items-center gap-4 pb-2">
        <a
          href="../../index.html"
          class="neu-btn w-10 h-10 flex items-center justify-center text-gray-500 hover:text-red-500 transition"
          title="Back to Hub"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1
          class="text-xl sm:text-2xl font-extrabold tracking-widest text-red-500 uppercase flex items-center gap-2"
        >
          <i class="fa-solid fa-key"></i> Password Generator
        </h1>
      </div>

      <!-- Password Length -->
      <div class="flex flex-col gap-3">
        <div class="flex items-center justify-between">
          <label
            for="length-slider"
            class="text-xs font-bold text-gray-500 uppercase tracking-wider"
          >
            Password Length
          </label>
          <span
            id="length-value"
            class="text-sm font-bold text-red-500 tabular-nums"
          >
            16
          </span>
        </div>
        <input
          type="range"
          id="length-slider"
          min="4"
          max="128"
          value="16"
          class="neu-pressed w-full h-3 appearance-none cursor-pointer bg-transparent accent-red-500"
        />
      </div>

      <!-- Character Options -->
      <div class="flex flex-col gap-2">
        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">
          Characters Used
        </span>
        <div class="flex flex-wrap gap-2" id="charset-toolbar">
          <button
            data-charset="uppercase"
            class="neu-btn neu-active px-4 py-2 text-sm text-gray-300 font-medium"
          >
            A-Z
          </button>
          <button
            data-charset="lowercase"
            class="neu-btn neu-active px-4 py-2 text-sm text-gray-300 font-medium"
          >
            a-z
          </button>
          <button
            data-charset="numbers"
            class="neu-btn neu-active px-4 py-2 text-sm text-gray-300 font-medium"
          >
            0-9
          </button>
          <button
            data-charset="symbols"
            class="neu-btn neu-active px-4 py-2 text-sm text-gray-300 font-medium"
          >
            !@#$%
          </button>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="flex flex-wrap gap-2">
        <button
          id="generate-btn"
          class="neu-btn px-4 py-2 text-sm text-gray-300 font-medium flex items-center gap-2"
        >
          <i class="fa-solid fa-rotate"></i>
          Generate
        </button>
        <button
          id="toggle-visibility-btn"
          class="neu-btn px-4 py-2 text-sm text-gray-300 font-medium flex items-center gap-2"
        >
          <i class="fa-solid fa-eye"></i>
          <span id="visibility-btn-label">Show</span>
        </button>
      </div>

      <!-- Output Area -->
      <div class="flex flex-col gap-2">
        <div class="flex items-center justify-between">
          <label
            for="output-password"
            class="text-xs font-bold text-gray-500 uppercase tracking-wider"
          >
            Generated Password
          </label>
          <button
            id="copy-btn"
            class="neu-btn px-4 py-1.5 text-xs text-gray-300 font-semibold flex items-center gap-2"
          >
            <i class="fa-regular fa-copy"></i>
            <span id="copy-btn-label">Copy</span>
          </button>
        </div>
        <input
          type="password"
          id="output-password"
          class="neu-pressed w-full p-4 text-red-500 bg-transparent outline-none font-mono tracking-wider placeholder-gray-600"
          placeholder="Click Generate to create a password..."
          readonly
        />
      </div>

      <!-- Stats -->
      <div class="flex justify-between gap-4 text-xs text-gray-500">
        <span id="strength-label">Strength: —</span>
        <span id="charset-size">Pool: 0 characters</span>
      </div>

      <p id="error-message" class="text-xs text-red-500 hidden"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
