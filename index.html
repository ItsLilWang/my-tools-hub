<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tools Hub</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Link CSS global -->
    <link rel="stylesheet" href="./assets/css/neumorphism.css" />
  </head>
  <body class="min-h-screen flex flex-col items-center p-10 font-sans">
    <!-- Hub Header -->
    <div class="mb-12 text-center">
      <h1 class="text-4xl font-extrabold text-white tracking-widest uppercase">
        My <span class="text-red-500">Workspace</span>
      </h1>
      <p class="text-gray-500 mt-2">
        A collection of custom utility tools (Code by Me)
      </p>
    </div>

    <!-- Tools Grid -->
    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-5xl"
    >
      <!-- Card: FontLab Tool -->
      <a
        href="./tools/font-lab/index.html"
        class="neu-flat p-6 flex flex-col gap-4 group cursor-pointer hover:-translate-y-2 transition-transform duration-300"
      >
        <div
          class="w-16 h-16 neu-btn flex items-center justify-center text-red-500 text-2xl group-hover:scale-110"
        >
          <i class="fa-solid fa-layer-group"></i>
        </div>
        <h2 class="text-xl font-bold text-white uppercase tracking-wider">
          FontLab
        </h2>
        <p class="text-gray-400 text-sm">
          Lightning-fast font tester for Designers, supporting Neumorphism UI.
        </p>
      </a>

      <!-- Card: Coming Soon -->
      <div
        class="neu-flat p-6 flex flex-col gap-4 opacity-50 cursor-not-allowed"
      >
        <div
          class="w-16 h-16 neu-btn flex items-center justify-center text-gray-600 text-2xl"
        >
          <i class="fa-solid fa-code"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-500 uppercase tracking-wider">
          Coming Soon
        </h2>
        <p class="text-gray-600 text-sm">Brewing new ideas, stay tuned...</p>
      </div>
    </div>
  </body>
</html>
